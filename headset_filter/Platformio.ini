; ============================================================================
;  PlatformIO config — Pocket WiFi Filter (ESP-IDF framework)
; ----------------------------------------------------------------------------
;  PlatformIO downloads and manages the ESP-IDF framework + toolchain itself,
;  so there is no manual C:\Espressif path wrangling. First build is slow
;  (it fetches the framework); later builds are fast.
;
;  HOW TO USE:
;    1. Open THIS folder (platformio-version) in VS Code with PlatformIO installed
;    2. Click the PlatformIO alien icon -> Build (checkmark) in the bottom toolbar
;    3. Plug in the ESP32, click Upload (arrow), then Monitor (plug)
;
;  The NAPT settings live in sdkconfig.defaults (next to this file) — PlatformIO
;  applies them automatically.
; ============================================================================
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200

; Actual chip is 2MB (the esp32dev board default assumes 4MB). This silences the
; "Expected 4MB, found 2MB" warning and uses our expanded app partition so the
; TLS stack for DoH fits.
board_upload.flash_size = 2MB
board_build.partitions = partitions.csv

; Apply our NAT / forwarding sdkconfig options on top of the defaults.
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
